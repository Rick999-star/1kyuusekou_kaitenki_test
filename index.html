<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>初学者向けテスト生成・受験システム</title>
    <style>
      :root {
        --bg: #eef3f8;
        --surface: #ffffff;
        --surface-soft: #f7fafc;
        --text: #163046;
        --muted: #62788d;
        --line: #d9e3ec;
        --navy: #1d5d8f;
        --teal: #12836d;
        --orange: #dd7b39;
        --violet: #6b67c8;
        --red: #cf5c5c;
        --sky: #e9f5ff;
        --mint: #e9f8f2;
        --sand: #fff3e8;
        --lavender: #f1efff;
        --danger-soft: #fff0f0;
        --ok-soft: #ecfbf3;
        --shadow: 0 18px 48px rgba(25, 46, 66, 0.10);
        --radius-xl: 28px;
        --radius-lg: 22px;
        --radius-md: 16px;
        --radius-sm: 12px;
        font-family: "Yu Gothic UI", "BIZ UDPGothic", "Hiragino Sans", sans-serif;
        color: var(--text);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        background:
          radial-gradient(circle at top left, rgba(29, 93, 143, 0.12), transparent 28%),
          radial-gradient(circle at right top, rgba(221, 123, 57, 0.10), transparent 22%),
          linear-gradient(180deg, #f3f7fb 0%, #eef3f8 100%);
        color: var(--text);
      }

      button,
      input,
      textarea,
      select {
        font: inherit;
      }

      button {
        cursor: pointer;
      }

      .app {
        width: min(100%, 1380px);
        margin: 0 auto;
        padding: 14px;
      }

      .hero {
        display: grid;
        gap: 16px;
        padding: 18px;
        border-radius: var(--radius-xl);
        background:
          linear-gradient(135deg, rgba(255, 255, 255, 0.98), rgba(247, 250, 252, 0.96)),
          linear-gradient(135deg, rgba(29, 93, 143, 0.05), rgba(18, 131, 109, 0.04));
        box-shadow: var(--shadow);
        margin-bottom: 16px;
      }

      .hero-title {
        margin: 0;
        font-family: "Yu Gothic UI", "BIZ UDPGothic", "Hiragino Sans", sans-serif;
        font-size: clamp(1.55rem, 4.8vw, 2.5rem);
        line-height: 1.18;
        letter-spacing: 0.01em;
        font-weight: 900;
      }

      .hero-subtitle {
        margin: 10px 0 0;
        color: var(--muted);
        font-size: 14px;
        line-height: 1.65;
        font-weight: 700;
      }

      .hero-tags,
      .summary-grid,
      .switches,
      .quick-metrics,
      .question-tags,
      .toolbar-row,
      .compact-list,
      .button-row {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }

      .hero-pill,
      .tag,
      .meta-pill {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 34px;
        padding: 8px 12px;
        border-radius: 999px;
        font-size: 13px;
        font-weight: 700;
      }

      .hero-pill {
        background: var(--sky);
        color: var(--navy);
      }

      .hero-pill.teal {
        background: var(--mint);
        color: var(--teal);
      }

      .hero-pill.orange {
        background: var(--sand);
        color: var(--orange);
      }

      .hero-bottom {
        display: grid;
        gap: 14px;
      }

      .summary-grid {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 10px;
      }

      .metric {
        padding: 14px 14px 12px;
        border-radius: var(--radius-lg);
        background: var(--surface);
        box-shadow: inset 0 0 0 1px rgba(217, 227, 236, 0.7);
      }

      .metric strong {
        display: block;
        font-size: clamp(1.5rem, 5vw, 2.2rem);
        line-height: 1;
        margin-bottom: 8px;
      }

      .metric.tests strong {
        color: var(--navy);
      }

      .metric.live strong {
        color: var(--teal);
      }

      .metric.count strong {
        color: var(--orange);
      }

      .metric span {
        color: var(--muted);
        font-size: 13px;
        font-weight: 700;
      }

      .switches {
        padding: 8px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.86);
        box-shadow: inset 0 0 0 1px rgba(217, 227, 236, 0.8);
      }

      .switches button {
        flex: 1 1 0;
        min-width: 120px;
        min-height: 48px;
        border: none;
        border-radius: 999px;
        background: transparent;
        color: var(--muted);
        font-weight: 800;
      }

      .switches button.active {
        background: linear-gradient(135deg, var(--navy), var(--teal));
        color: white;
        box-shadow: 0 10px 24px rgba(23, 87, 135, 0.20);
      }

      .layout {
        display: grid;
        gap: 16px;
      }

      .panel,
      .exam-card,
      .question-card,
      .result-card,
      .login-card {
        background: rgba(255, 255, 255, 0.94);
        border-radius: var(--radius-lg);
        box-shadow: var(--shadow);
      }

      .panel,
      .exam-card,
      .question-card,
      .login-card {
        padding: 18px;
      }

      .panel-title {
        margin: 0 0 14px;
        font-size: 15px;
        font-weight: 900;
        letter-spacing: 0.02em;
      }

      .field {
        display: grid;
        gap: 8px;
        margin-bottom: 14px;
      }

      .label {
        color: var(--muted);
        font-size: 13px;
        font-weight: 700;
      }

      .field input,
      .field textarea,
      .field select,
      .answer-input,
      .answer-textarea,
      .formula-textarea {
        width: 100%;
        padding: 14px 15px;
        border: 1px solid var(--line);
        border-radius: var(--radius-md);
        background: var(--surface);
        color: var(--text);
      }

      .field textarea,
      .answer-textarea,
      .formula-textarea {
        resize: vertical;
      }

      .two-col {
        display: grid;
        grid-template-columns: 1fr;
        gap: 12px;
      }

      .help {
        margin: 0;
        color: var(--muted);
        font-size: 13px;
        line-height: 1.6;
      }

      .divider {
        height: 1px;
        margin: 18px 0;
        background: var(--line);
      }

      .upload-box {
        position: relative;
        display: grid;
        place-items: center;
        min-height: 108px;
        border: 2px dashed #bfd2e2;
        border-radius: var(--radius-lg);
        background:
          linear-gradient(135deg, rgba(233, 245, 255, 0.85), rgba(255, 255, 255, 0.85));
        text-align: center;
        padding: 16px;
      }

      .upload-box input {
        position: absolute;
        inset: 0;
        opacity: 0;
      }

      .btn,
      .btn-soft,
      .btn-alert {
        min-height: 46px;
        padding: 10px 16px;
        border-radius: 999px;
        border: none;
        font-weight: 800;
      }

      .btn {
        background: linear-gradient(135deg, var(--navy), var(--teal));
        color: white;
      }

      .btn-soft {
        background: #f5f9fc;
        color: var(--navy);
        border: 1px solid var(--line);
      }

      .btn-alert {
        background: var(--sand);
        color: var(--orange);
        border: 1px solid #f0d0b8;
      }

      .button-row {
        align-items: center;
      }

      .settings-card {
        padding: 14px;
        border-radius: var(--radius-md);
        background: linear-gradient(135deg, var(--lavender), rgba(255, 255, 255, 0.7));
        border: 1px solid #dddaf5;
      }

      .test-list,
      .question-list,
      .exam-list {
        display: grid;
        gap: 10px;
      }

      .list-card,
      .question-chip {
        width: 100%;
        padding: 14px;
        text-align: left;
        border: 1px solid transparent;
        border-radius: var(--radius-md);
        background: var(--surface-soft);
      }

      .list-card.active,
      .question-chip.active {
        border-color: #a8c7e0;
        background: linear-gradient(135deg, #edf6ff, #f7fbff);
      }

      .list-card strong,
      .question-chip strong {
        display: block;
        margin-bottom: 5px;
      }

      .chip-meta {
        color: var(--muted);
        font-size: 12px;
        margin-bottom: 6px;
      }

      .status-pill {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 24px;
        padding: 4px 10px;
        border-radius: 999px;
        font-size: 11px;
        font-weight: 800;
      }

      .status-pill.live {
        background: var(--mint);
        color: var(--teal);
      }

      .status-pill.off {
        background: var(--danger-soft);
        color: var(--red);
      }

      .chip-text {
        font-size: 14px;
        line-height: 1.55;
      }

      .toggle {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 14px;
        border-radius: var(--radius-md);
        background: var(--mint);
        font-weight: 700;
      }

      .editor-type-formula .editor-banner,
      .editor-type-written .editor-banner,
      .editor-type-multiple_choice .editor-banner,
      .editor-type-fill_blank .editor-banner {
        padding: 12px 14px;
        border-radius: var(--radius-md);
        margin-bottom: 14px;
        font-size: 13px;
        font-weight: 800;
      }

      .editor-type-formula .editor-banner {
        background: var(--lavender);
        color: var(--violet);
      }

      .editor-type-written .editor-banner {
        background: var(--sand);
        color: var(--orange);
      }

      .editor-type-multiple_choice .editor-banner {
        background: var(--sky);
        color: var(--navy);
      }

      .editor-type-fill_blank .editor-banner {
        background: var(--mint);
        color: var(--teal);
      }

      .formula-box,
      .preview-box {
        padding: 14px;
        border-radius: var(--radius-md);
        background: #f7fbff;
        border: 1px solid #dce8f1;
      }

      .toolbar-group {
        display: grid;
        gap: 8px;
      }

      .toolbar-row {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }

      .toolbar-chip {
        min-height: 40px;
        padding: 8px 12px;
        border-radius: 999px;
        border: 1px solid #d6e4ef;
        background: white;
        color: var(--navy);
        font-weight: 700;
      }

      .formula-preview {
        min-height: 52px;
        padding: 12px 14px;
        border-radius: var(--radius-md);
        background: white;
        overflow-x: auto;
      }

      .formula-fallback {
        font-family: "Consolas", "Courier New", monospace;
        color: var(--navy);
      }

      .login-wrap,
      .empty-state {
        display: grid;
        place-items: center;
        min-height: 220px;
        text-align: center;
      }

      .login-card {
        width: min(100%, 560px);
      }

      .exam-card {
        position: relative;
        overflow: hidden;
      }

      .exam-card::before {
        content: "";
        position: absolute;
        left: 0;
        top: 0;
        bottom: 0;
        width: 8px;
        background: linear-gradient(180deg, var(--navy), var(--teal));
      }

      .exam-card-body {
        padding-left: 10px;
      }

      .exam-head {
        display: grid;
        gap: 12px;
      }

      .question-card {
        position: relative;
        overflow: hidden;
        display: grid;
        gap: 14px;
      }

      .question-card.type-multiple_choice {
        border-top: 8px solid var(--navy);
      }

      .question-card.type-fill_blank {
        border-top: 8px solid var(--teal);
      }

      .question-card.type-written {
        border-top: 8px solid var(--orange);
      }

      .question-card.type-formula {
        border-top: 8px solid var(--violet);
      }

      .q-head {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 12px;
      }

      .q-number {
        width: 44px;
        height: 44px;
        border-radius: 50%;
        display: grid;
        place-items: center;
        background: linear-gradient(135deg, var(--navy), var(--teal));
        color: white;
        font-weight: 900;
        flex: 0 0 auto;
      }

      .question-tags {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }

      .tag {
        padding: 7px 11px;
        border-radius: 999px;
        font-size: 12px;
        font-weight: 800;
      }

      .tag.type {
        background: var(--sky);
        color: var(--navy);
      }

      .tag.level {
        background: var(--sand);
        color: var(--orange);
      }

      .tag.topic {
        background: var(--mint);
        color: var(--teal);
      }

      .q-text {
        font-size: 17px;
        line-height: 1.75;
        font-weight: 700;
      }

      .choices {
        display: grid;
        gap: 10px;
      }

      .choice {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 14px;
        border-radius: var(--radius-md);
        border: 1px solid var(--line);
        background: var(--surface-soft);
      }

      .choice.active {
        background: #edf6ff;
        border-color: #9fc0da;
      }

      .choice span {
        font-weight: 700;
      }

      .mini-help {
        color: var(--muted);
        font-size: 13px;
        line-height: 1.6;
      }

      .result-card {
        padding: 16px;
        border-radius: var(--radius-md);
        line-height: 1.7;
      }

      .result-card.ok {
        background: var(--ok-soft);
        border: 1px solid #cdecd9;
      }

      .result-card.ng {
        background: var(--danger-soft);
        border: 1px solid #f2d3d3;
      }

      .result-title {
        font-weight: 900;
        margin-bottom: 6px;
      }

      .score-card {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        padding: 18px;
      }

      .score-main strong {
        display: block;
        font-size: clamp(2rem, 8vw, 3.1rem);
        line-height: 1;
        color: var(--navy);
      }

      .score-main span {
        color: var(--muted);
        font-weight: 700;
      }

      .hidden {
        display: none !important;
      }

      @media (min-width: 760px) {
        .app {
          padding: 20px;
        }

        .hero {
          padding: 24px;
        }

        .hero-bottom {
          grid-template-columns: 1fr auto;
          align-items: end;
        }

        .two-col {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }

        .exam-head {
          grid-template-columns: 1fr auto;
          align-items: center;
        }
      }

      @media (min-width: 1180px) {
        .hero {
          grid-template-columns: 1.3fr 0.9fr;
          align-items: start;
        }

        .layout {
          grid-template-columns: 0.95fr 1.05fr 1.15fr;
        }
      }
    </style>
  </head>
  <body>
    <div class="app">
      <header class="hero">
        <div>
          <h1 id="hero-title" class="hero-title">初学者向けテスト生成・受験システム</h1>
          <p id="hero-subtitle" class="hero-subtitle">管理者設定と受験画面を切り替えながら、テーマ別テストを作成できます。</p>
          <div id="hero-tags" class="hero-tags">
            <span class="hero-pill">管理者設定</span>
            <span class="hero-pill teal">受験対応</span>
            <span class="hero-pill orange">スマホ最適化</span>
          </div>
        </div>
        <div class="hero-bottom">
          <div class="summary-grid">
            <div class="metric tests">
              <strong id="metric-tests">0</strong>
              <span>テスト</span>
            </div>
            <div class="metric live">
              <strong id="metric-published">0</strong>
              <span>公開中</span>
            </div>
            <div class="metric count">
              <strong id="metric-questions">0</strong>
              <span>問題数</span>
            </div>
          </div>
          <div class="switches">
            <button id="view-admin" class="active" type="button">管理者画面</button>
            <button id="view-taker" type="button">受験者画面</button>
          </div>
        </div>
      </header>

      <main>
        <section id="admin-login-root"></section>
        <section id="admin-root"></section>
        <section id="taker-root"></section>
      </main>
    </div>

    <script>
      const STORAGE_TESTS = "beginner-test-html.tests";
      const STORAGE_SETTINGS = "beginner-test-html.settings";

      const TYPE_LABELS = {
        multiple_choice: "選択式",
        fill_blank: "穴埋め式",
        written: "記述式",
        formula: "公式入力"
      };

      const LEVEL_LABELS = {
        basic: "やさしい",
        standard: "ふつう",
        challenge: "発展"
      };

      const PRESET_LABELS = {
        easy: "やさしくする",
        standard: "標準",
        hard: "やや難しくする"
      };

      const DEFAULT_SETTINGS = {
        aiServicePublicUrl: "",
        defaultDifficultyPreset: "standard",
        aiScoringPrompt:
          "重要キーワードの一致を優先し、初学者にも分かる短い説明かどうかを確認して採点してください。",
        adminPassword: "admin1234"
      };

      const SAMPLE_TESTS = [
        {
          id: "TEST-001",
          title: "電気回路 入門チェック",
          description: "電流・電圧・抵抗の基本を短く確認する公開テストです。",
          published: true,
          createdAt: "2026-05-20T09:00:00.000Z",
          referenceSummary: "オームの法則と基本用語を中心に出題します。",
          questions: [
            {
              id: "Q001",
              type: "multiple_choice",
              difficulty: "basic",
              topic: "電気回路",
              question: "電流を表す記号はどれですか。",
              choices: ["V", "I", "R", "P"],
              answer: "I",
              explanation: "電流は I、電圧は V、抵抗は R で表します。",
              important_terms: ["電流", "I"],
              isPublished: true
            },
            {
              id: "Q002",
              type: "fill_blank",
              difficulty: "basic",
              topic: "電気回路",
              question: "電圧・電流・抵抗の関係を表す法則を何といいますか。",
              answer: "オームの法則",
              acceptable_answers: ["オームの法則", "おーむのほうそく"],
              explanation: "V = IR で表される関係をオームの法則といいます。",
              important_terms: ["オームの法則", "V=IR"],
              isPublished: true
            },
            {
              id: "Q003",
              type: "written",
              difficulty: "standard",
              topic: "電気回路",
              question: "抵抗が大きくなると電流はどうなりますか。短く説明してください。",
              explanation: "電圧が同じなら、抵抗が大きいほど電流は小さくなります。",
              important_terms: ["抵抗", "電流", "小さくなる"],
              model_answer: "同じ電圧なら、抵抗が大きいほど流れる電流は小さくなります。",
              keywords: ["抵抗", "電流", "小さくなる"],
              scoring: { total: 10, keyword_points: 6, context_points: 4 },
              isPublished: true
            },
            {
              id: "Q004",
              type: "formula",
              difficulty: "basic",
              topic: "電気回路",
              question: "オームの法則を LaTeX 形式で入力してください。",
              explanation: "電圧 V、電流 I、抵抗 R の関係は V = IR です。",
              important_terms: ["オームの法則", "電圧", "電流", "抵抗"],
              answer_latex: "V = IR",
              acceptable_latex: ["V=IR", "V = IR", "V=I R", "V=R I"],
              symbols: ["V", "I", "R"],
              isPublished: true
            }
          ]
        },
        {
          id: "TEST-002",
          title: "力学 基礎ドラフト",
          description: "未公開の下書きデータです。",
          published: false,
          createdAt: "2026-05-20T10:00:00.000Z",
          referenceSummary: "速度、加速度、力の関係を扱うサンプルです。",
          questions: [
            {
              id: "Q101",
              type: "multiple_choice",
              difficulty: "basic",
              topic: "力学",
              question: "速度の単位として正しいものはどれですか。",
              choices: ["m/s", "N", "J", "Pa"],
              answer: "m/s",
              explanation: "速度の代表的な単位は m/s です。",
              important_terms: ["速度", "m/s"],
              isPublished: true
            },
            {
              id: "Q102",
              type: "formula",
              difficulty: "basic",
              topic: "力学",
              question: "運動方程式を入力してください。",
              explanation: "力は質量と加速度の積で表せます。",
              important_terms: ["力", "質量", "加速度"],
              answer_latex: "F = ma",
              acceptable_latex: ["F=ma", "F = ma", "F=m a"],
              symbols: ["F", "m", "a"],
              isPublished: true
            }
          ]
        }
      ];

      const state = {
        view: "admin",
        adminAuthed: false,
        adminMessage: "管理者パスワードを入力してください。",
        settingsMessage: "設定変更は自動保存されます。",
        tests: loadJson(STORAGE_TESTS, SAMPLE_TESTS),
        settings: loadJson(STORAGE_SETTINGS, DEFAULT_SETTINGS),
        selectedTestId: null,
        selectedQuestionId: null,
        referenceFileName: "",
        referenceText: "",
        referenceStatus: "参照ファイルを選ぶと問題を生成できます。",
        activeTestId: null,
        responses: {},
        result: null
      };

      state.selectedTestId = state.tests[0] ? state.tests[0].id : null;
      normalizeQuestionVisibility();

      function loadJson(key, fallback) {
        try {
          const raw = localStorage.getItem(key);
          return raw ? JSON.parse(raw) : JSON.parse(JSON.stringify(fallback));
        } catch (error) {
          return JSON.parse(JSON.stringify(fallback));
        }
      }

      function saveState() {
        localStorage.setItem(STORAGE_TESTS, JSON.stringify(state.tests));
        localStorage.setItem(STORAGE_SETTINGS, JSON.stringify(state.settings));
      }

      function shuffleArray(items) {
        const list = items.slice();
        for (let index = list.length - 1; index > 0; index -= 1) {
          const swapIndex = Math.floor(Math.random() * (index + 1));
          const current = list[index];
          list[index] = list[swapIndex];
          list[swapIndex] = current;
        }
        return list;
      }

      function sanitizeQuestion(question) {
        return {
          ...question,
          isPublished: question.isPublished !== false
        };
      }

      function isStructuralMarkdownLine(line) {
        const trimmed = String(line || "").trim();
        return !trimmed || /^-{3,}$/.test(trimmed) || /^_{3,}$/.test(trimmed) || /^>{3,}$/.test(trimmed);
      }

      function clampQuestionSelectionCount(count, total) {
        if (!total) return 0;
        const normalized = Number(count);
        if (!Number.isFinite(normalized)) return Math.min(total, 20);
        return Math.max(1, Math.min(total, Math.round(normalized)));
      }

      function ensureTestQuestionPool(test) {
        const sourcePool =
          Array.isArray(test.questionPool) && test.questionPool.length ? test.questionPool : Array.isArray(test.questions) ? test.questions : [];
        const pool = sourcePool.map(sanitizeQuestion);
        const poolById = new Map(pool.map((question) => [question.id, question]));
        const selectedSource =
          Array.isArray(test.questions) && test.questions.length
            ? test.questions
            : pool.slice(0, clampQuestionSelectionCount(test.questionSelectionCount, pool.length) || pool.length);

        const selected = selectedSource.map((question) => {
          const existing = poolById.get(question.id);
          if (existing) return existing;
          const next = sanitizeQuestion(question);
          pool.push(next);
          poolById.set(next.id, next);
          return next;
        });

        test.questionPool = pool;
        test.questions = selected;
        test.questionSelectionCount = clampQuestionSelectionCount(
          test.questionSelectionCount || selected.length || pool.length,
          pool.length
        );

        if (!test.questions.length && pool.length) {
          test.questions = pool.slice(0, test.questionSelectionCount);
        }
      }

      function pickQuestionSet(questionPool, count, shouldShuffle) {
        const order = ["multiple_choice", "fill_blank", "written", "formula"];
        const grouped = Object.fromEntries(
          order.map((type) => [
            type,
            (questionPool || []).filter((question) => question.type === type)
          ])
        );
        order.forEach((type) => {
          if (shouldShuffle) {
            grouped[type] = shuffleArray(grouped[type]);
          }
        });

        const selected = [];
        let hasProgress = true;
        while (selected.length < count && hasProgress) {
          hasProgress = false;
          order.forEach((type) => {
            if (selected.length >= count) return;
            if (grouped[type] && grouped[type].length) {
              selected.push(grouped[type].shift());
              hasProgress = true;
            }
          });
        }

        return selected;
      }

      function applyQuestionSelection(test, shouldShuffle) {
        ensureTestQuestionPool(test);
        const count = clampQuestionSelectionCount(test.questionSelectionCount, test.questionPool.length);
        test.questionSelectionCount = count;
        test.questions = pickQuestionSet(test.questionPool, count, shouldShuffle);
      }

      function buildGeneratedTest(topic, safeText, questions) {
        const questionPool = applyDifficultyPreset(questions).map(sanitizeQuestion);
        const questionSelectionCount = clampQuestionSelectionCount(
          questionPool.length > 20 ? 20 : questionPool.length,
          questionPool.length
        );
        return {
          id: createId("TEST"),
          title: topic + " 自動生成テスト",
          description: "参照ファイルから生成したテストです。",
          published: false,
          createdAt: new Date().toISOString(),
          referenceSummary: summarizeText(safeText),
          questionPool,
          questionSelectionCount,
          questions: pickQuestionSet(questionPool, questionSelectionCount || questionPool.length, true)
        };
      }

      function normalizeQuestionVisibility() {
        state.tests.forEach((test) => {
          ensureTestQuestionPool(test);
        });
      }

      function createId(prefix) {
        if (window.crypto && crypto.randomUUID) {
          return prefix + "-" + crypto.randomUUID().slice(0, 8);
        }
        return prefix + "-" + Math.random().toString(36).slice(2, 10);
      }

      function normalizeText(value) {
        return String(value || "").normalize("NFKC").trim().toLowerCase().replace(/\s+/g, "");
      }

      function normalizeLatex(value) {
        return String(value || "")
          .normalize("NFKC")
          .replace(/\\left|\\right/g, "")
          .replace(/\\times/g, "*")
          .replace(/\\cdot/g, "*")
          .replace(/×/g, "*")
          .replace(/\\div/g, "/")
          .replace(/÷/g, "/")
          .replace(/[{}]/g, "")
          .replace(/\s+/g, "")
          .trim()
          .toLowerCase();
      }

      function splitCsv(value) {
        return String(value || "")
          .split(",")
          .map((item) => item.trim())
          .filter(Boolean);
      }

      function splitLines(value) {
        return String(value || "")
          .split(/\r?\n/)
          .map((item) => item.trim())
          .filter(Boolean);
      }

      function summarizeText(value, maxLength = 160) {
        const normalized = String(value || "").replace(/\s+/g, " ").trim();
        return normalized.length <= maxLength ? normalized : normalized.slice(0, maxLength) + "...";
      }

      function questionMaxPoints(question) {
        return question.type === "written" ? question.scoring.total : question.type === "formula" ? 10 : 5;
      }

      function escapeHtml(value) {
        return String(value == null ? "" : value)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#39;");
      }

      function selectedTest() {
        return state.tests.find((test) => test.id === state.selectedTestId) || state.tests[0] || null;
      }

      function selectedQuestion() {
        const test = selectedTest();
        if (!test) return null;
        return test.questions.find((question) => question.id === state.selectedQuestionId) || test.questions[0] || null;
      }

      function updateMetrics() {
        document.getElementById("metric-tests").textContent = String(state.tests.length);
        document.getElementById("metric-published").textContent = String(
          state.tests.filter((test) => test.published).length
        );
        document.getElementById("metric-questions").textContent = String(
          state.tests.reduce((sum, test) => sum + test.questions.length, 0)
        );
      }

      function setView(nextView) {
        state.view = nextView;
        document.getElementById("view-admin").classList.toggle("active", nextView === "admin");
        document.getElementById("view-taker").classList.toggle("active", nextView === "taker");
        render();
      }

      function extractTerms(referenceText) {
        const stopWords = new Set(["です", "ます", "こと", "ため", "よう", "する", "した", "いる", "ある"]);
        return Array.from(
          new Set(
            String(referenceText)
              .split(/[\s、。,.()\[\]{}「」『』:;!?！？]+/)
              .map((token) => token.trim())
              .filter((token) => token.length >= 2 && !stopWords.has(token))
          )
        ).slice(0, 8);
      }

      function detectTopic(referenceText, terms) {
        if (/電流|電圧|抵抗|オーム/.test(referenceText)) return "電気回路";
        if (/速度|加速度|質量|運動/.test(referenceText)) return "力学";
        if (/化学|分子|原子|反応/.test(referenceText)) return "化学基礎";
        return terms[0] || "基礎学習";
      }

      function extractFormula(referenceText) {
        const match = String(referenceText).match(/[A-Za-z]+\s*=\s*[A-Za-z0-9+\-*/ ]+/);
        return match ? match[0].replace(/\s+/g, " ").trim() : null;
      }

      function applyDifficultyPreset(questions) {
        const preset = state.settings.defaultDifficultyPreset;
        return questions.map((question, index) => {
          if (preset === "easy") {
            return { ...question, difficulty: "basic" };
          }
          if (preset === "hard") {
            return {
              ...question,
              difficulty:
                question.type === "written" || question.type === "formula" ? "challenge" : "standard"
            };
          }
          if (question.difficulty === "basic" && index > 1) {
            return { ...question, difficulty: "standard" };
          }
          return question;
        });
      }

      function cleanInlineMarkdown(text) {
        return String(text || "")
          .replace(/\r/g, "")
          .replace(/!\[[^\]]*\]\([^)]+\)/g, "")
          .replace(/\[([^\]]+)\]\([^)]+\)/g, "$1")
          .replace(/<br\s*\/?>/gi, " ")
          .replace(/&nbsp;/gi, " ")
          .replace(/\*\*/g, "")
          .replace(/\*/g, "")
          .replace(/~~/g, "")
          .replace(/`/g, "")
          .trim();
      }

      function countQuestionMarkers(referenceText) {
        const matches = String(referenceText || "").match(
          /(?:^|\n)\s*(?:#{1,6}\s*)?(?:問(?:題)?\s*\d+|Q(?:uestion)?[\s._-]*\d+|\d+\s*[.)．])/gim
        );
        return matches ? matches.length : 0;
      }

      function splitQuestionBlocks(referenceText) {
        const lines = String(referenceText || "")
          .replace(/\r\n?/g, "\n")
          .split("\n");
        const blocks = [];
        let current = [];

        lines.forEach((rawLine) => {
          const line = cleanInlineMarkdown(rawLine);
          const trimmed = line.trim();

          if (!trimmed) {
            if (current.length && current[current.length - 1] !== "") {
              current.push("");
            }
            return;
          }

          const isQuestionStart = /^(?:#{1,6}\s*)?(?:問(?:題)?\s*\d+|Q(?:uestion)?[\s._-]*\d+|\d+\s*[.)．])\s*/i.test(
            trimmed
          );

          if (isQuestionStart && current.length) {
            blocks.push(current.join("\n").trim());
            current = [trimmed];
            return;
          }

          current.push(trimmed);
        });

        if (current.length) {
          blocks.push(current.join("\n").trim());
        }

        return blocks.filter(Boolean);
      }

      function toChoiceLabelIndex(value) {
        const normalized = normalizeText(value).toUpperCase();
        const kanaLabels = ["ア", "イ", "ウ", "エ", "オ", "カ"];
        const kanaIndex = kanaLabels.indexOf(normalized);
        if (kanaIndex >= 0) {
          return kanaIndex;
        }
        if (/^[A-D]$/.test(normalized)) {
          return normalized.charCodeAt(0) - 65;
        }
        if (/^\d+$/.test(normalized)) {
          return Math.max(0, Number(normalized) - 1);
        }
        return -1;
      }

      function resolveChoiceAnswer(answerText, choices) {
        if (!choices.length) return answerText;
        const labelIndex = toChoiceLabelIndex(answerText);
        if (labelIndex >= 0 && labelIndex < choices.length) {
          return choices[labelIndex];
        }
        const normalizedAnswer = normalizeText(answerText);
        const exact = choices.find((choice) => normalizeText(choice) === normalizedAnswer);
        return exact || answerText;
      }

      function extractFormulaSymbols(text) {
        return Array.from(new Set((String(text || "").match(/[A-Za-z\u0391-\u03C9]+/g) || []).map((token) => token.trim()))).slice(
          0,
          8
        );
      }

      function getQuestionExplanation(question) {
        const raw = String(question.explanation || "").trim();
        if (raw && !isStructuralMarkdownLine(raw)) {
          return raw;
        }

        if (question.type === "multiple_choice") {
          return question.answer ? "正解は「" + question.answer + "」です。" : "正しい選択肢を確認しましょう。";
        }
        if (question.type === "fill_blank") {
          return question.answer ? "空欄には「" + question.answer + "」が入ります。" : "空欄に入る語句を確認しましょう。";
        }
        if (question.type === "formula") {
          return question.answer_latex ? "正しい式は " + question.answer_latex + " です。" : "式の形を確認しましょう。";
        }
        return question.model_answer ? "模範解答の要点: " + question.model_answer : "重要語句を含めて説明できるかを確認しましょう。";
      }

      function visibleQuestionsForTest(test) {
        return (test && Array.isArray(test.questions) ? test.questions : []).filter((question) => question.isPublished !== false);
      }

      function topicSummaryFromQuestions(questions) {
        const counts = new Map();
        (questions || []).forEach((question) => {
          const topic = String(question.topic || "").trim();
          if (!topic) return;
          counts.set(topic, (counts.get(topic) || 0) + 1);
        });
        return Array.from(counts.entries()).sort((left, right) => right[1] - left[1]);
      }

      function dominantTopicForTest(test) {
        const entries = topicSummaryFromQuestions((test && test.questionPool && test.questionPool.length ? test.questionPool : test && test.questions) || []);
        return entries[0] ? entries[0][0] : "";
      }

      function buildThemeBasedTitle(theme) {
        return theme ? theme + " 理解チェック" : "基礎理解チェック";
      }

      function buildThemeBasedSubtitle(test) {
        const visibleQuestions = visibleQuestionsForTest(test);
        const types = Array.from(new Set(visibleQuestions.map((question) => TYPE_LABELS[question.type]).filter(Boolean)));
        const topicEntries = topicSummaryFromQuestions(visibleQuestions);
        const theme = topicEntries[0] ? topicEntries[0][0] : dominantTopicForTest(test);
        const typeText = types.length ? types.join("・") : "基礎";
        return theme
          ? theme + "の重要ポイントを確認する" + typeText + "テストです。"
          : typeText + "で基礎を確認するテストです。";
      }

      function takerDisplayTitle(test) {
        const theme = dominantTopicForTest(test);
        return buildThemeBasedTitle(theme || String(test && test.title ? test.title : "").trim());
      }

      function takerDisplaySubtitle(test) {
        const description = String(test && test.description ? test.description : "").trim();
        if (description && !/参照ファイルから生成したテストです。|未公開の下書きデータです。/.test(description)) {
          return description;
        }
        return buildThemeBasedSubtitle(test);
      }

      function buildGeneratedTestTitle(referenceFileName, test) {
        const theme = dominantTopicForTest(test);
        if (theme) {
          return buildThemeBasedTitle(theme);
        }
        return referenceFileName.replace(/\.[^.]+$/, "") + " テスト";
      }

      function buildAcceptableAnswers(answerText) {
        const raw = String(answerText || "").trim();
        const variants = new Set([raw]);

        raw
          .split(/[\/／,，、]|または|あるいは/g)
          .map((part) => part.trim())
          .filter(Boolean)
          .forEach((part) => variants.add(part));

        if (raw) {
          variants.add(raw.replace(/\s+/g, ""));
        }

        return Array.from(variants).filter(Boolean);
      }

      function parseQuestionHeader(line) {
        const match = String(line || "").match(
          /^(?:#{1,6}\s*)?(?:(?:問(?:題)?\s*(\d+)|Q(?:uestion)?[\s._-]*(\d+))\s*[.)．]?\s*|(\d+)\s*[.)．]\s*)(.*)$/i
        );
        return match
          ? {
              number: match[1] || match[2] || match[3] || "",
              text: (match[4] || "").replace(/^[.)、．]+\s*/, "").trim()
            }
          : null;
      }

      function inferQuestionType(questionText, answerText, choices) {
        const joined = [questionText, answerText].join(" ");
        if (choices.length >= 2) return "multiple_choice";
        if (/_{2,}|（\s*）|\(\s*\)|\[+\s*\]+|【[^】]*】|空欄|穴埋め/.test(joined)) return "fill_blank";
        if (
          /計算式|定義式|関係式|式を記述|表せ|求めよ|数値計算/.test(questionText) &&
          /[=＝\/×÷+\-]/.test(answerText)
        ) {
          return "formula";
        }
        if (/\\frac|\\sqrt|\^\{|\_\{|[A-Za-z\u0391-\u03C9]\s*=\s*[^。,\n]+|公式|LaTeX|数式/.test(joined)) {
          return "formula";
        }
        return "written";
      }

      function parseMarkdownQuestions(referenceText, fallbackTopic) {
        const blocks = splitQuestionBlocks(referenceText);
        return blocks
          .map((block) => {
            const lines = block
              .split("\n")
              .map((line) => cleanInlineMarkdown(line))
              .filter(Boolean);

            if (!lines.length) return null;

            const header = parseQuestionHeader(lines[0]);
            if (!header) return null;

            let questionText = header.text;
            const questionParts = [];
            const choices = [];
            let answerText = "";
            let explanation = "";
            let collectingAnswer = false;

            for (let index = 1; index < lines.length; index += 1) {
              const line = lines[index];

              if (isStructuralMarkdownLine(line)) {
                if (collectingAnswer) {
                  collectingAnswer = false;
                }
                continue;
              }

              if (!questionText && !questionParts.length) {
                const nextHeader = parseQuestionHeader(line);
                if (!nextHeader) {
                  questionParts.push(line);
                  continue;
                }
              }

              if (collectingAnswer) {
                if (/^(?:必須キーワード|採点基準|減点ルール)\s*[:：]?/.test(line)) {
                  collectingAnswer = false;
                  continue;
                }
                const explanationWhileAnswer = line.match(/^(?:解説|説明|ポイント|補足)\s*[:：]\s*(.+)$/);
                if (explanationWhileAnswer) {
                  collectingAnswer = false;
                  explanation = explanationWhileAnswer[1].trim();
                  continue;
                }
                answerText = [answerText, line].filter(Boolean).join(" ");
                continue;
              }

              const answerMatch = line.match(/^(?:答え|解答|模範解答|解答例|正解|回答)\s*[:：]\s*(.*)$/);
              if (answerMatch) {
                answerText = answerMatch[1].trim();
                collectingAnswer = !answerText;
                continue;
              }

              const explanationMatch = line.match(/^(?:解説|説明|ポイント|補足)\s*[:：]\s*(.+)$/);
              if (explanationMatch) {
                explanation = explanationMatch[1].trim();
                continue;
              }

              const alphaChoiceMatch = line.match(/^(?:[-*+]\s*)?([A-DＡ-Ｄa-dア-オｱ-ｵ])[\.\):：、]\s*(.+)$/);
              if (alphaChoiceMatch) {
                choices.push(alphaChoiceMatch[2].trim());
                continue;
              }

              const numericChoiceMatch = line.match(/^(?:[-*+]\s*)?([1-9０-９][0-9０-９]*)[\.\):：、]\s*(.+)$/);
              if (
                numericChoiceMatch &&
                (choices.length > 0 || /次から|選択|選べ|どれ|正しいもの|誤っているもの/.test([questionText].concat(questionParts).join(" ")))
              ) {
                choices.push(numericChoiceMatch[2].trim());
                continue;
              }

              const bulletChoiceMatch = line.match(/^[-*+]\s+(.+)$/);
              if (bulletChoiceMatch && (choices.length > 0 || /次から|選択|選べ|どれ/.test([questionText].concat(questionParts).join(" ")))) {
                choices.push(bulletChoiceMatch[1].trim());
                continue;
              }

              if (!answerText && !explanation && /^(?:備考|注|補記)\s*[:：]\s*/.test(line)) {
                continue;
              }

              if (/^(?:必須キーワード|採点基準|減点ルール)\s*[:：]?/.test(line)) {
                continue;
              }

              if (!answerText) {
                questionParts.push(line);
              } else if (!explanation) {
                explanation = line;
              }
            }

            if (!questionText) {
              questionText = questionParts.shift() || "";
            }

            if (questionParts.length) {
              questionText = [questionText].concat(questionParts).filter(Boolean).join(" ");
            }

            questionText = questionText.trim();
            if (!questionText) return null;

            const topic = detectTopic(questionText + "\n" + answerText, extractTerms(questionText + " " + answerText)) || fallbackTopic;
            const type = inferQuestionType(questionText, answerText, choices);
            const importantTerms = extractTerms([topic, questionText, answerText, explanation].join(" ")).slice(0, 6);

            if (type === "multiple_choice") {
              const resolvedAnswer = resolveChoiceAnswer(answerText, choices);
              return {
                id: createId("Q"),
                type,
                difficulty: "basic",
                topic,
                question: questionText,
                choices,
                answer: resolvedAnswer || choices[0] || "",
                explanation: explanation || (resolvedAnswer ? "正解は「" + resolvedAnswer + "」です。" : ""),
                important_terms: importantTerms,
                isPublished: true
              };
            }

            if (type === "fill_blank") {
              const acceptableAnswers = buildAcceptableAnswers(answerText);
              return {
                id: createId("Q"),
                type,
                difficulty: "basic",
                topic,
                question: questionText,
                answer: answerText || acceptableAnswers[0] || "",
                acceptable_answers: acceptableAnswers,
                explanation:
                  explanation || (answerText || acceptableAnswers[0] ? "空欄には「" + (answerText || acceptableAnswers[0]) + "」が入ります。" : "空欄を確認しましょう。"),
                important_terms: importantTerms,
                isPublished: true
              };
            }

            if (type === "formula") {
              const formulaText = answerText || extractFormula(questionText) || extractFormula(referenceText) || "a = b + c";
              const compactFormula = formulaText.replace(/\s+/g, "");
              return {
                id: createId("Q"),
                type,
                difficulty: "basic",
                topic,
                question: questionText,
                explanation: explanation || (formulaText ? "正しい式は " + formulaText + " です。" : "式の形と記号の対応を確認しましょう。"),
                important_terms: importantTerms,
                answer_latex: formulaText,
                acceptable_latex: Array.from(new Set([formulaText, compactFormula])).filter(Boolean),
                symbols: extractFormulaSymbols(formulaText),
                isPublished: true
              };
            }

            const modelAnswer = answerText || explanation || "要点をまとめて説明してください。";
            const keywords = extractTerms(modelAnswer).slice(0, 4);
            return {
              id: createId("Q"),
              type: "written",
              difficulty: "standard",
              topic,
              question: questionText,
              explanation: explanation || (modelAnswer ? "模範解答の要点: " + modelAnswer : "重要語句を含めて説明できるかを確認します。"),
              important_terms: importantTerms,
              model_answer: modelAnswer,
              keywords,
              scoring: { total: 10, keyword_points: 6, context_points: 4 },
              isPublished: true
            };
          })
          .filter(Boolean);
      }

      function generateQuestions(referenceText) {
        const safeText = String(referenceText || "").trim() || "基礎用語の確認資料";
        const terms = extractTerms(safeText);
        const topic = detectTopic(safeText, terms);
        const formula = extractFormula(safeText) || (topic === "力学" ? "F = ma" : "V = IR");
        const parsedQuestions = parseMarkdownQuestions(safeText, topic);
        const questionMarkerCount = countQuestionMarkers(safeText);
        let questions;

        if (parsedQuestions.length && (parsedQuestions.length >= 3 || questionMarkerCount >= 3)) {
          return buildGeneratedTest(topic, safeText, parsedQuestions);
        }

        if (topic === "電気回路") {
          questions = [
            {
              id: createId("Q"),
              type: "multiple_choice",
              difficulty: "basic",
              topic,
              question: "電流を表す記号はどれですか。",
              choices: ["V", "I", "R", "W"],
              answer: "I",
              explanation: "電流は I、電圧は V、抵抗は R です。",
              important_terms: ["電流", "I"],
              isPublished: true
            },
            {
              id: createId("Q"),
              type: "fill_blank",
              difficulty: "basic",
              topic,
              question: "電圧・電流・抵抗の関係を表す法則を何といいますか。",
              answer: "オームの法則",
              acceptable_answers: ["オームの法則", "おーむのほうそく"],
              explanation: "電気回路の初学者が最初に覚える基本法則です。",
              important_terms: ["オームの法則", "V=IR"],
              isPublished: true
            },
            {
              id: createId("Q"),
              type: "written",
              difficulty: "standard",
              topic,
              question: "抵抗が大きくなると電流はどうなりますか。短く説明してください。",

      function scoreQuestion(question, userAnswer) {
        if (question.type === "multiple_choice") {
          const isCorrect = normalizeText(userAnswer) === normalizeText(question.answer);
          return {
            questionId: question.id,
            earnedPoints: isCorrect ? questionMaxPoints(question) : 0,
            maxPoints: questionMaxPoints(question),
            isCorrect,
            feedback: isCorrect ? "正解です。" : "不正解です。",
            expectedAnswer: question.answer,
            userAnswer
          };
        }

        if (question.type === "fill_blank") {
          const accepts = [question.answer].concat(question.acceptable_answers).map(normalizeText);
          const isCorrect = accepts.includes(normalizeText(userAnswer));
          return {
            questionId: question.id,
            earnedPoints: isCorrect ? questionMaxPoints(question) : 0,
            maxPoints: questionMaxPoints(question),
            isCorrect,
            feedback: isCorrect ? "正解です。" : "不正解です。",
            expectedAnswer: question.answer,
            userAnswer
          };
        }

        if (question.type === "formula") {
          const accepts = [question.answer_latex].concat(question.acceptable_latex).map(normalizeLatex);
          const isCorrect = accepts.includes(normalizeLatex(userAnswer));
          return {
            questionId: question.id,
            earnedPoints: isCorrect ? questionMaxPoints(question) : 0,
            maxPoints: questionMaxPoints(question),
            isCorrect,
            feedback: isCorrect ? "公式を正しく入力できています。" : "不正解です。",
            expectedAnswer: question.answer_latex,
            userAnswer
          };
        }

        const matched = question.keywords.filter((keyword) =>
          normalizeText(userAnswer).includes(normalizeText(keyword))
        );
        const keywordRatio = question.keywords.length ? matched.length / question.keywords.length : 0;
        const keywordPoints = Math.round(question.scoring.keyword_points * keywordRatio);
        const contextRatio = userAnswer.trim().length >= 25 ? 0.5 : userAnswer.trim() ? 0.25 : 0;
        const contextPoints = Math.round(
          question.scoring.context_points * Math.min(1, keywordRatio + contextRatio)
        );
        const earned = Math.min(question.scoring.total, keywordPoints + contextPoints);
        return {
          questionId: question.id,
          earnedPoints: earned,
          maxPoints: question.scoring.total,
          isCorrect: earned >= Math.ceil(question.scoring.total * 0.6),
          feedback: matched.length
            ? "仮採点です。キーワード一致: " + matched.join("、")
            : "仮採点です。重要キーワードが少ないため加点が伸びていません。",
          expectedAnswer: question.model_answer,
          userAnswer
        };
      }

      function gradeTest(test, responses) {
        const breakdowns = test.questions.map((question) => scoreQuestion(question, responses[question.id] || ""));
        const totalPoints = breakdowns.reduce((sum, item) => sum + item.earnedPoints, 0);
        const maxPoints = breakdowns.reduce((sum, item) => sum + item.maxPoints, 0);
        return {
          percentage: maxPoints ? Math.round((totalPoints / maxPoints) * 100) : 0,
          totalPoints,
          maxPoints,
          breakdowns
        };
      }

        const base = {

        if (type === "multiple_choice") return { ...base, choices: ["", "", "", ""], answer: "" };
        if (type === "fill_blank") return { ...base, answer: "", acceptable_answers: [] };
        if (type === "written") {

            ...base,
            model_answer: "",
            keywords: [],
            scoring: { total: 10, keyword_points: 6, context_points: 4 }

          saveState();
        };

        document.getElementById("save-password").onclick = () => {
          const current = document.getElementById("current-password").value;
          const next = document.getElementById("new-password").value;
          const confirm = document.getElementById("confirm-password").value;

          if (current !== state.settings.adminPassword) {
            state.settingsMessage = "現在の管理者パスワードが一致しません。";
          } else if (!next.trim()) {
            state.settingsMessage = "新しいパスワードを入力してください。";
          } else if (next !== confirm) {
            state.settingsMessage = "新しいパスワード確認が一致しません。";
          } else {
            state.settings.adminPassword = next;
            state.settingsMessage = "管理者パスワードを更新しました。";
            saveState();
          }

          render();
        };

        document.getElementById("reference-file").onchange = async (event) => {
          const file = event.target.files[0];
          if (!file) return;
          state.referenceFileName = file.name;

          if (file.type.startsWith("text/") || /\.(txt|md|csv|json|tex)$/i.test(file.name)) {
            state.referenceText = await file.text();
            state.referenceStatus = file.name + " の本文を読み込みました。";
          } else {
            state.referenceText =
              "参照ファイル名: " + file.name + "\nMVPではこの形式の本文抽出は未実装です。";
            state.referenceStatus = file.name + " は本文抽出未対応のため、ファイル名ベースのモック生成を行います。";
          }

          render();
        };

        document.getElementById("generate-questions").onclick = () => {
          if (!state.referenceFileName) {
            state.referenceStatus = "先に参照ファイルを選んでください。";
            render();
            return;
          }

          const draft = generateQuestions(state.referenceText);
          draft.id = createId("TEST");
          draft.title = buildGeneratedTestTitle(state.referenceFileName, draft);
          state.tests.unshift(draft);
          state.selectedTestId = draft.id;
          state.selectedQuestionId = draft.questions[0] ? draft.questions[0].id : null;
          const poolCount = Array.isArray(draft.questionPool) ? draft.questionPool.length : draft.questions.length;
          state.referenceStatus =
            state.referenceFileName +
            " から " +
            poolCount +
            " 問を候補として読み込み、" +
            draft.questions.length +
            " 問をセットしました。難易度設定は「" +
            PRESET_LABELS[state.settings.defaultDifficultyPreset] +
            "」です。";
          saveState();
          render();
        };

        document.getElementById("export-json").onclick = () => {
          const blob = new Blob([JSON.stringify({ tests: state.tests, settings: state.settings }, null, 2)], {
            type: "application/json"
          });
          const url = URL.createObjectURL(blob);
          const anchor = document.createElement("a");
          anchor.href = url;
          anchor.download = "tests.json";
          anchor.click();
          URL.revokeObjectURL(url);
        };

        document.querySelectorAll("[data-test-id]").forEach((button) => {
          button.onclick = () => {
            state.selectedTestId = button.dataset.testId;
            state.selectedQuestionId = null;
            render();
          };
        });

        const test = selectedTest();
        if (!test) return;

        document.getElementById("test-title").oninput = (event) => {
          test.title = event.target.value;
          saveState();
        };
        document.getElementById("test-description").oninput = (event) => {
          test.description = event.target.value;
          saveState();
        };
        document.getElementById("test-reference").oninput = (event) => {
          test.referenceSummary = event.target.value;
          saveState();
        };
        document.getElementById("test-published").onchange = (event) => {
          test.published = event.target.checked;
          saveState();
          render();
        };
        document.getElementById("test-question-count").onchange = (event) => {
          test.questionSelectionCount = clampQuestionSelectionCount(event.target.value, test.questionPool.length);
          saveState();
        };
        document.getElementById("apply-question-count").onclick = () => {
          applyQuestionSelection(test, false);
          state.selectedQuestionId = test.questions[0] ? test.questions[0].id : null;
          saveState();
          render();
        };
        document.getElementById("shuffle-questions").onclick = () => {
          applyQuestionSelection(test, true);
          state.selectedQuestionId = test.questions[0] ? test.questions[0].id : null;
          saveState();
          render();
        };

        document.querySelectorAll("[data-add-type]").forEach((button) => {
          button.onclick = () => {
            const nextQuestion = emptyQuestionByType(button.dataset.addType);
            ensureTestQuestionPool(test);
            test.questionPool.push(nextQuestion);
            test.questions.push(nextQuestion);
            test.questionSelectionCount = test.questions.length;
            state.selectedQuestionId = nextQuestion.id;
            saveState();
            render();
          };
        });

        document.querySelectorAll("[data-question-id]").forEach((button) => {
          button.onclick = () => {
            state.selectedQuestionId = button.dataset.questionId;
            render();
          };
        });

        const question = selectedQuestion();
        if (!question) return;
        bindQuestionEditor(question);
      }

      function bindQuestionEditor(question) {
        const saveAndRender = () => {
          saveState();
          render();
        };

        const bind = (id, handler, eventName = "input") => {
          const element = document.getElementById(id);
          if (element) element["on" + eventName] = handler;
        };

        bind("q-question", (event) => {
          question.question = event.target.value;
          saveAndRender();
        });
        bind("q-topic", (event) => {
          question.topic = event.target.value;
          saveAndRender();
        });
        bind("q-difficulty", (event) => {
          question.difficulty = event.target.value;
          saveAndRender();
        }, "change");
        bind("q-explanation", (event) => {
          question.explanation = event.target.value;
          saveAndRender();
        });
        bind("q-important", (event) => {
          question.important_terms = splitCsv(event.target.value);
          saveAndRender();
        });
        bind("q-published", (event) => {
          question.isPublished = event.target.checked;
          saveAndRender();
        }, "change");

        if (question.type === "multiple_choice") {
          bind("q-choices", (event) => {
            question.choices = splitLines(event.target.value);
            saveAndRender();
          });
          bind("q-answer", (event) => {
            question.answer = event.target.value;
            saveAndRender();
          });
        } else if (question.type === "fill_blank") {
          bind("q-answer", (event) => {
            question.answer = event.target.value;
            saveAndRender();
          });
          bind("q-acceptable", (event) => {
            question.acceptable_answers = splitLines(event.target.value);
            saveAndRender();
          });
        } else if (question.type === "written") {
          bind("q-model-answer", (event) => {
            question.model_answer = event.target.value;
            saveAndRender();
          });
          bind("q-keywords", (event) => {
            question.keywords = splitCsv(event.target.value);
            saveAndRender();
          });
          bind("q-total", (event) => {
            question.scoring.total = Number(event.target.value);
            saveAndRender();
          });
          bind("q-keyword-points", (event) => {
            question.scoring.keyword_points = Number(event.target.value);
            saveAndRender();
          });
          bind("q-context-points", (event) => {
            question.scoring.context_points = Number(event.target.value);
            saveAndRender();
          });
        } else if (question.type === "formula") {
          bind("q-answer-latex", (event) => {
            question.answer_latex = event.target.value;
            saveAndRender();
          });
          bind("q-acceptable-latex", (event) => {
            question.acceptable_latex = splitLines(event.target.value);
            saveAndRender();
          });
          bind("q-symbols", (event) => {
            question.symbols = splitCsv(event.target.value);
            saveAndRender();
          });
        }
      }

      function renderTaker() {
        const root = document.getElementById("taker-root");
        if (state.view !== "taker") {
          root.innerHTML = "";
          return;
        }

        const publishedTests = state.tests.filter((test) => test.published);
        const activeTest = publishedTests.find((test) => test.id === state.activeTestId) || null;

        if (!activeTest) {
          root.innerHTML = publishedTests.length
            ? `<div class="exam-list">${publishedTests.map((test) => `
                <article class="exam-card">
                  <div class="exam-card-body">
                    <div class="exam-head">
                      <div>
                        <h2 class="panel-title">${escapeHtml(takerDisplayTitle(test))}</h2>
                        <p class="help">${escapeHtml(takerDisplaySubtitle(test))}</p>
                      </div>
                      <button class="btn" type="button" data-start-test="${test.id}">テスト開始</button>
                    </div>
                    <div class="quick-metrics" style="margin-top:12px;">
                      <span class="meta-pill hero-pill">${visibleQuestionsForTest(test).length} 問</span>
                      <span class="meta-pill hero-pill teal">${escapeHtml(dominantTopicForTest(test) || test.referenceSummary)}</span>
                    </div>
                  </div>
                </article>
              `).join("")}</div>`
            : `<div class="empty-state"><div class="panel">公開中のテストはまだありません。</div></div>`;

          document.querySelectorAll("[data-start-test]").forEach((button) => {
            button.onclick = () => {
              const test = publishedTests.find((item) => item.id === button.dataset.startTest);
              const visibleQuestions = test.questions.filter((question) => question.isPublished !== false);
              state.activeTestId = test.id;
              state.responses = Object.fromEntries(visibleQuestions.map((question) => [question.id, ""]));
              state.result = null;
              render();
            };
          });
          return;
        }

        const visibleQuestions = activeTest.questions.filter((question) => question.isPublished !== false);

        if (!visibleQuestions.length) {
          root.innerHTML = `
            <div class="exam-list">
              <div class="panel">
                <div class="button-row" style="justify-content:space-between;">
                  <div>
                    <h2 class="panel-title" style="margin-bottom:8px;">${escapeHtml(takerDisplayTitle(activeTest))}</h2>
                    <p class="help" style="margin-bottom:10px;">${escapeHtml(takerDisplaySubtitle(activeTest))}</p>
                    <div class="quick-metrics">
                      <span class="hero-pill">0問</span>
                      <span class="hero-pill teal">公開前</span>
                    </div>
                  </div>
                  <button id="back-to-tests" class="btn-soft" type="button">一覧へ戻る</button>
                </div>
              </div>
              <div class="panel">このテストには公開中の問題がまだありません。</div>
            </div>
          `;
          document.getElementById("back-to-tests").onclick = () => {
            state.activeTestId = null;
            render();
          };
          return;
        }

        root.innerHTML = `
          <div class="exam-list">
            <div class="panel">
              <div class="button-row" style="justify-content:space-between;">
                <div>
                  <h2 class="panel-title" style="margin-bottom:8px;">${escapeHtml(takerDisplayTitle(activeTest))}</h2>
                  <p class="help" style="margin-bottom:10px;">${escapeHtml(takerDisplaySubtitle(activeTest))}</p>
                  <div class="quick-metrics">
                    <span class="hero-pill">${visibleQuestions.length}問</span>
                    <span class="hero-pill teal">${escapeHtml(dominantTopicForTest(activeTest) || "受験中")}</span>
                    <span class="hero-pill orange">${state.result ? "採点済み" : "回答中"}</span>
                  </div>
                </div>
                <button id="back-to-tests" class="btn-soft" type="button">一覧へ戻る</button>
              </div>
            </div>
            ${visibleQuestions.map((question, index) => renderQuestionCard(question, index)).join("")}
            ${
              state.result
                ? `<div class="score-card panel">
                    <div class="score-main">
                      <strong>${state.result.percentage}%</strong>
                      <span>${state.result.totalPoints} / ${state.result.maxPoints} 点</span>
                    </div>
                    <button id="retry-test" class="btn" type="button">もう一度解く</button>
                  </div>`
                : `<div class="panel"><button id="submit-test" class="btn" type="button" style="width:100%;">提出して採点</button></div>`
            }
          </div>
        `;

        document.getElementById("back-to-tests").onclick = () => {
          state.activeTestId = null;
          render();
        };

        if (state.result) {
          document.getElementById("retry-test").onclick = () => {
            state.responses = Object.fromEntries(visibleQuestions.map((question) => [question.id, ""]));
            state.result = null;
            render();
          };
        } else {
          document.getElementById("submit-test").onclick = () => {
            state.result = gradeTest({ ...activeTest, questions: visibleQuestions }, state.responses);
            render();
          };
        }

        bindExamInputs();
      }

      function renderQuestionCard(question, index) {
        const breakdown = state.result
          ? state.result.breakdowns.find((item) => item.questionId === question.id)
          : null;

        return `
          <article class="question-card type-${question.type}">
            <div class="q-head">
              <div class="button-row" style="justify-content:flex-start;">
                <div class="q-number">Q${index + 1}</div>
                <div class="question-tags">
                  <span class="tag type">${TYPE_LABELS[question.type]}</span>
                  <span class="tag level">${LEVEL_LABELS[question.difficulty]}</span>
                  <span class="tag topic">${escapeHtml(question.topic)}</span>
                </div>
              </div>
            </div>
            <div class="q-text">${escapeHtml(question.question)}</div>
            ${renderAnswerInput(question)}
            ${question.type === "formula" ? '<div class="mini-help">ギリシャ文字や分数ボタンで入力できます。</div>' : ""}
            ${
              breakdown
                ? `<div class="result-card ${breakdown.isCorrect ? "ok" : "ng"}">
                    <div class="result-title">${breakdown.earnedPoints} / ${breakdown.maxPoints} 点</div>
                    <div>${escapeHtml(breakdown.feedback)}</div>
                    <div>あなたの回答: ${escapeHtml(breakdown.userAnswer || "未入力")}</div>
                    <div>正解例: ${escapeHtml(breakdown.expectedAnswer)}</div>
                    <div>解説: ${escapeHtml(getQuestionExplanation(question))}</div>
                  </div>`
                : ""
            }
          </article>
        `;
      }

      function renderAnswerInput(question) {
        const value = state.responses[question.id] || "";

        if (question.type === "multiple_choice") {
          return `<div class="choices">${question.choices.map((choice) => `
            <label class="choice ${value === choice ? "active" : ""}">
              <input type="radio" name="${question.id}" value="${escapeHtml(choice)}" ${value === choice ? "checked" : ""} />
              <span>${escapeHtml(choice)}</span>
            </label>
          `).join("")}</div>`;
        }

        if (question.type === "fill_blank") {
          return `<input class="answer-input" data-answer-id="${question.id}" value="${escapeHtml(value)}" placeholder="答えを入力" />`;
        }

        if (question.type === "written") {
          return `<textarea class="answer-textarea" data-answer-id="${question.id}" rows="5" placeholder="短く説明してください">${escapeHtml(value)}</textarea>`;
        }

        return `
          <div class="formula-box">
            <div class="toolbar-group">
              <div class="label">ギリシャ文字</div>
              <div class="toolbar-row">
                ${[
                  ["α", "\\alpha"], ["β", "\\beta"], ["γ", "\\gamma"], ["Δ", "\\Delta"], ["θ", "\\theta"],
                  ["λ", "\\lambda"], ["μ", "\\mu"], ["ρ", "\\rho"], ["σ", "\\sigma"], ["ω", "\\omega"]
                ].map(([label, insert]) => `<button class="toolbar-chip" type="button" data-insert="${escapeHtml(insert)}" data-target="${question.id}">${label}</button>`).join("")}
              </div>
            </div>
            <div class="toolbar-group">
              <div class="label">構造</div>
              <div class="toolbar-row">
                <button class="toolbar-chip" type="button" data-insert="\\frac{}{}" data-offset="-3" data-target="${question.id}">分数</button>
                <button class="toolbar-chip" type="button" data-insert="^{}" data-offset="-1" data-target="${question.id}">指数</button>
                <button class="toolbar-chip" type="button" data-insert="_{}" data-offset="-1" data-target="${question.id}">下付き</button>
                <button class="toolbar-chip" type="button" data-insert="\\sqrt{}" data-offset="-1" data-target="${question.id}">平方根</button>
              </div>
            </div>
            <div class="toolbar-group">
              <div class="label">基本記号</div>
              <div class="toolbar-row">
                ${["+", "-", "\\times", "\\div", "=", "(", ")"].map((item) => `<button class="toolbar-chip" type="button" data-insert="${escapeHtml(item)}" data-target="${question.id}">${escapeHtml(item)}</button>`).join("")}
              </div>
            </div>
            <textarea class="formula-textarea" data-answer-id="${question.id}" rows="4" placeholder="例: V = IR または \\frac{V}{R}">${escapeHtml(value)}</textarea>
            <div class="preview-box">
              <div class="label">プレビュー</div>
              <div id="formula-preview-${question.id}" class="formula-preview">${renderFormula(value)}</div>
            </div>
          </div>
        `;
      }

      function bindExamInputs() {
        document.querySelectorAll('input[type="radio"]').forEach((element) => {
          element.onchange = () => {
            state.responses[element.name] = element.value;
            render();
          };
        });

        document.querySelectorAll("[data-answer-id]").forEach((element) => {
          element.oninput = (event) => {
            const questionId = event.target.dataset.answerId;
            state.responses[questionId] = event.target.value;
            const preview = document.getElementById("formula-preview-" + questionId);
            if (preview) preview.innerHTML = renderFormula(event.target.value);
          };
        });

        document.querySelectorAll("[data-insert]").forEach((button) => {
          button.onclick = () => {
            const targetId = button.dataset.target;
            const textarea = document.querySelector(`textarea[data-answer-id="${targetId}"]`);
            if (!textarea) return;
            const insert = button.dataset.insert;
            const offset = Number(button.dataset.offset || 0);
            const start = textarea.selectionStart;
            const end = textarea.selectionEnd;
            const nextValue = textarea.value.slice(0, start) + insert + textarea.value.slice(end);
            textarea.value = nextValue;
            state.responses[targetId] = nextValue;
            const nextPos = start + insert.length + offset;
            textarea.focus();
            textarea.setSelectionRange(nextPos, nextPos);
            const preview = document.getElementById("formula-preview-" + targetId);
            if (preview) preview.innerHTML = renderFormula(nextValue);
          };
        });
      }

      document.getElementById("view-admin").onclick = () => setView("admin");
      document.getElementById("view-taker").onclick = () => setView("taker");

      render();
    </script>
  </body>
</html>
